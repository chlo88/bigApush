name: 晚间新闻

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests
      - name: Push evening news
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python evening_news.py
